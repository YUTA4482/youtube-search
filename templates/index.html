<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube 動画検索</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --grad: linear-gradient(135deg, #7c3aed, #db2777, #06b6d4);
      --grad-h: linear-gradient(135deg, #6d28d9, #be185d, #0891b2);
    }
    * { box-sizing: border-box; }
    body { background: #0a0a0a; color: #e5e7eb; font-family: 'Helvetica Neue', Arial, sans-serif; }

    /* ヘッダー */
    header {
      background: #0a0a0a;
      border-bottom: 1px solid #1f1f1f;
      position: sticky; top: 0; z-index: 50;
    }
    .logo-grad {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    /* 検索ボックス */
    .search-wrap {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
    }
    #query {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e5e7eb;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    #query:focus { border-color: #7c3aed; }
    #query::placeholder { color: #555; }
    #max_results {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e5e7eb;
      border-radius: 10px;
    }
    #searchBtn {
      background: var(--grad);
      color: #fff;
      font-weight: 700;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    #searchBtn:hover { opacity: 0.85; transform: translateY(-1px); }
    #searchBtn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

    /* フィルターパネル */
    .filter-section { border-top: 1px solid #1f1f1f; }
    .filter-label { color: #555; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; width: 88px; flex-shrink: 0; }

    .filter-btn {
      padding: 4px 14px;
      border-radius: 9999px;
      font-size: 0.72rem;
      font-weight: 600;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #7c3aed; color: #c4b5fd; }
    .filter-btn.active {
      background: var(--grad);
      border-color: transparent;
      color: #fff;
    }

    /* カード */
    .video-card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .video-card:hover { border-color: #7c3aed55; transform: translateY(-2px); }

    .card-thumb { position: relative; flex-shrink: 0; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .duration-pill {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .card-title { color: #f3f4f6; font-weight: 700; line-height: 1.4; }
    .card-title:hover { color: #c4b5fd; }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      color: #6b7280;
    }

    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 9999px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
    }
    .stat-view    { color: #818cf8; border-color: #3730a3; }
    .stat-like    { color: #34d399; border-color: #065f46; }
    .stat-comment { color: #fbbf24; border-color: #78350f; }

    /* エンゲージメントバッジ */
    .engage-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    .eg-weak    { background: #1c1917; color: #d97706; border: 1px solid #78350f; }
    .eg-develop { background: #052e16; color: #4ade80; border: 1px solid #14532d; }
    .eg-normal  { background: #0f172a; color: #818cf8; border: 1px solid #1e3a8a; }
    .eg-strong  { background: #2d0036; color: #e879f9; border: 1px solid #701a75; }
    .eg-best    { background: #1a0036; color: #a78bfa; border: 1px solid #4c1d95; box-shadow: 0 0 8px #7c3aed55; }
    .eg-none    { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; }

    /* タグ */
    .tag-badge {
      display: inline-block;
      background: #1a1a1a;
      color: #7c3aed;
      border: 1px solid #2e1065;
      border-radius: 9999px;
      padding: 2px 10px;
      font-size: 0.7rem;
      margin: 2px;
    }

    /* YouTube ボタン */
    .yt-btn {
      display: inline-block;
      background: var(--grad);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s;
      letter-spacing: 0.03em;
    }
    .yt-btn:hover { opacity: 0.8; }

    /* details */
    details summary {
      cursor: pointer;
      color: #7c3aed;
      font-size: 0.72rem;
      list-style: none;
    }
    details summary:hover { color: #a78bfa; }
    details p { color: #6b7280; font-size: 0.75rem; white-space: pre-line; margin-top: 6px; }

    /* スピナー */
    .spinner {
      border: 3px solid #1f1f1f;
      border-top-color: #7c3aed;
      border-radius: 50%;
      width: 36px; height: 36px;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* エラー */
    #error {
      background: #1a0a0a;
      border: 1px solid #7f1d1d;
      color: #f87171;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.85rem;
    }

    /* サマリー */
    #summary { color: #4b5563; font-size: 0.8rem; }

    /* グラデーションライン装飾 */
    .grad-bar {
      height: 2px;
      background: var(--grad);
      border-radius: 9999px;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header>
    <div class="max-w-5xl mx-auto px-5 py-4 flex items-center gap-3">
      <svg class="w-6 h-6 flex-shrink-0" viewBox="0 0 24 24" style="fill:url(#ytgrad)">
        <defs>
          <linearGradient id="ytgrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="50%" stop-color="#db2777"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
      </svg>
      <span class="logo-grad text-lg">YouTube SEARCH</span>
    </div>
    <div class="grad-bar" style="border-radius:0"></div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">

    <!-- 検索フォーム -->
    <div class="search-wrap p-6 mb-6">
      <div class="flex flex-col sm:flex-row gap-3">
        <input id="query" type="text" placeholder="検索ワードを入力..."
          class="flex-1 px-4 py-3 text-sm" />
        <select id="max_results" class="px-4 py-3 text-sm">
          <option value="5">5件</option>
          <option value="10" selected>10件</option>
          <option value="25">25件</option>
          <option value="50">50件</option>
        </select>
        <button id="searchBtn" class="px-7 py-3 text-sm">検索</button>
      </div>

      <!-- フィルターパネル -->
      <div class="filter-section mt-5 pt-5 flex flex-col gap-4">

        <div class="flex flex-wrap items-center gap-3">
          <span class="filter-label">PERIOD</span>
          <div class="flex flex-wrap gap-2" id="periodBtns">
            <button class="filter-btn active" data-value="all">全期間</button>
            <button class="filter-btn" data-value="1month">1ヶ月</button>
            <button class="filter-btn" data-value="2months">2ヶ月</button>
            <button class="filter-btn" data-value="6months">6ヶ月</button>
            <button class="filter-btn" data-value="1year">1年</button>
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-3">
          <span class="filter-label">LENGTH</span>
          <div class="flex flex-wrap gap-2" id="durationBtns">
            <button class="filter-btn active" data-value="all">すべて</button>
            <button class="filter-btn" data-value="short">ショート（〜1分）</button>
            <button class="filter-btn" data-value="middle">ミドル（1分1秒〜6分59秒）</button>
            <button class="filter-btn" data-value="long">ロング（7分〜）</button>
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-3">
          <span class="filter-label">ENGAGE</span>
          <div class="flex flex-wrap gap-2" id="engageBtns">
            <button class="filter-btn active" data-value="all">すべて</button>
            <button class="filter-btn" data-value="weak">弱小</button>
            <button class="filter-btn" data-value="develop">発展</button>
            <button class="filter-btn" data-value="normal">普通</button>
            <button class="filter-btn" data-value="strong">優勢</button>
            <button class="filter-btn" data-value="best">最強</button>
          </div>
        </div>

      </div>
    </div>

    <!-- ローディング -->
    <div id="loading" class="hidden flex justify-center py-16">
      <div class="spinner"></div>
    </div>

    <!-- エラー -->
    <div id="error" class="hidden mb-6"></div>

    <!-- サマリー -->
    <div id="summary" class="hidden mb-4 px-1"></div>

    <!-- 結果一覧 -->
    <div id="results" class="flex flex-col gap-4"></div>
  </main>

  <script>
    const queryInput    = document.getElementById("query");
    const maxResultsSel = document.getElementById("max_results");
    const searchBtn     = document.getElementById("searchBtn");
    const loading       = document.getElementById("loading");
    const errorBox      = document.getElementById("error");
    const summary       = document.getElementById("summary");
    const resultsEl     = document.getElementById("results");

    let allVideos = [];
    let selectedPeriod   = "all";
    let selectedDuration = "all";
    let selectedEngage   = "all";

    function setupToggle(id, onChange) {
      const container = document.getElementById(id);
      container.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          container.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          onChange(btn.dataset.value);
        });
      });
    }
    setupToggle("periodBtns",   (v) => { selectedPeriod = v; });
    setupToggle("durationBtns", (v) => { selectedDuration = v; applyFilters(); });
    setupToggle("engageBtns",   (v) => { selectedEngage   = v; applyFilters(); });

    queryInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(); });
    searchBtn.addEventListener("click", doSearch);

    async function doSearch() {
      const query = queryInput.value.trim();
      if (!query) { showError("検索ワードを入力してください。"); return; }
      const max_results = parseInt(maxResultsSel.value);

      hideError();
      resultsEl.innerHTML = "";
      summary.classList.add("hidden");
      loading.classList.remove("hidden");
      searchBtn.disabled = true;

      try {
        const res = await fetch("/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, max_results, period: selectedPeriod }),
        });
        const data = await res.json();
        if (!res.ok || data.error) { showError(data.error || "エラーが発生しました。"); return; }
        if (data.message) {
          summary.textContent = data.message;
          summary.classList.remove("hidden");
          return;
        }
        allVideos = data.results;
        applyFilters(query);
      } catch {
        showError("通信エラーが発生しました。");
      } finally {
        loading.classList.add("hidden");
        searchBtn.disabled = false;
      }
    }

    function engagementLevel(v) {
      if (!v.subscriber_count_raw) return null;
      const r = v.view_count_raw / v.subscriber_count_raw;
      if (r < 0.4)  return "weak";
      if (r < 0.8)  return "develop";
      if (r < 1.5)  return "normal";
      if (r < 3.0)  return "strong";
      return "best";
    }

    function applyFilters(query) {
      let filtered = allVideos.filter(v => {
        if (selectedDuration === "short"  && v.duration_seconds >= 60)  return false;
        if (selectedDuration === "middle" && (v.duration_seconds < 61 || v.duration_seconds >= 420)) return false;
        if (selectedDuration === "long"   && v.duration_seconds < 420) return false;
        if (selectedEngage !== "all" && engagementLevel(v) !== selectedEngage) return false;
        return true;
      });
      const q = query || queryInput.value.trim();
      summary.textContent = `「${q}」 — ${allVideos.length} 件取得 / フィルター後 ${filtered.length} 件表示`;
      summary.classList.remove("hidden");
      renderResults(filtered);
    }

    const ENGAGE_META = {
      weak:    { label: "弱小", cls: "eg-weak" },
      develop: { label: "発展", cls: "eg-develop" },
      normal:  { label: "普通", cls: "eg-normal" },
      strong:  { label: "優勢", cls: "eg-strong" },
      best:    { label: "最強", cls: "eg-best" },
    };

    function renderResults(videos) {
      resultsEl.innerHTML = "";
      if (!videos.length) {
        resultsEl.innerHTML = `<p style="color:#374151;text-align:center;padding:60px 0;font-size:0.9rem;">フィルター条件に一致する動画がありません。</p>`;
        return;
      }
      videos.forEach(v => {
        const lvl = engagementLevel(v);
        const em  = lvl ? ENGAGE_META[lvl] : null;
        const engageBadge = em
          ? `<span class="engage-badge ${em.cls}">${em.label}</span>`
          : `<span class="engage-badge eg-none">データなし</span>`;
        const ratio = (v.subscriber_count_raw && v.subscriber_count_raw > 0)
          ? (v.view_count_raw / v.subscriber_count_raw).toFixed(2) : "-";

        const card = document.createElement("div");
        card.className = "video-card";
        card.innerHTML = `
          <div style="display:flex;flex-direction:column;" class="sm:flex-row">
            <div class="card-thumb" style="flex-shrink:0;width:100%;height:180px;position:relative;">
              <a href="${v.url}" target="_blank" rel="noopener noreferrer" style="display:block;height:100%;">
                <img src="${v.thumbnail}" alt="${escHtml(v.title)}" style="width:100%;height:100%;object-fit:cover;"/>
              </a>
              <span class="duration-pill">${v.duration}</span>
            </div>
            <div style="flex:1;padding:18px 20px;display:flex;flex-direction:column;gap:10px;">
              <a href="${v.url}" target="_blank" rel="noopener noreferrer" class="card-title" style="font-size:0.95rem;text-decoration:none;">
                ${escHtml(v.title)}
              </a>
              <div style="display:flex;flex-wrap:wrap;gap:12px;">
                <span class="meta-chip">&#128197; ${v.published_at}</span>
                <span class="meta-chip" style="color:#4b5563;">&#128274; ${escHtml(v.channel_name)}</span>
                <span class="meta-chip">登録者 ${v.subscriber_count}</span>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:6px;">
                <span class="stat-chip stat-view">&#128065; ${v.view_count}</span>
                <span class="stat-chip stat-like">&#128077; ${v.like_count}</span>
                <span class="stat-chip stat-comment">&#128172; ${v.comment_count}</span>
              </div>
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                ${engageBadge}
                <span style="font-size:0.7rem;color:#374151;">比率 <span style="color:#9ca3af;font-weight:700;">${ratio}</span></span>
              </div>
              ${v.description ? `
              <details>
                <summary>説明を表示</summary>
                <p>${escHtml(v.description.slice(0, 1000))}${v.description.length > 1000 ? "…" : ""}</p>
              </details>` : ""}
              ${v.tags && v.tags.length ? `
              <div style="display:flex;flex-wrap:wrap;">
                ${v.tags.slice(0, 10).map(t => `<span class="tag-badge">${escHtml(t)}</span>`).join("")}
                ${v.tags.length > 10 ? `<span class="tag-badge" style="color:#4b5563;">+${v.tags.length - 10}</span>` : ""}
              </div>` : ""}
              <div style="margin-top:auto;padding-top:6px;">
                <a href="${v.url}" target="_blank" rel="noopener noreferrer" class="yt-btn">YouTubeで見る ↗</a>
              </div>
            </div>
          </div>
        `;

        // sm以上でサムネを横並びに
        const thumbDiv = card.querySelector(".card-thumb");
        const applyLayout = () => {
          if (window.innerWidth >= 640) {
            card.querySelector("div").style.flexDirection = "row";
            thumbDiv.style.width = "220px";
            thumbDiv.style.height = "auto";
            thumbDiv.style.minHeight = "150px";
          } else {
            card.querySelector("div").style.flexDirection = "column";
            thumbDiv.style.width = "100%";
            thumbDiv.style.height = "180px";
          }
        };
        applyLayout();
        window.addEventListener("resize", applyLayout);

        resultsEl.appendChild(card);
      });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    function showError(msg) { errorBox.textContent = msg; errorBox.classList.remove("hidden"); }
    function hideError()    { errorBox.textContent = ""; errorBox.classList.add("hidden"); }
  </script>
</body>
</html>
